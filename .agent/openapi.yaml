openapi: 3.0.3
info:
  title: BuildCRM Backend API
  description: Multi-tenant SaaS platform for construction companies. Manages properties, units, deals, payments, CRM, finance, warehouse, and more.
  version: 1.0.0
servers:
  - url: http://localhost:8080
    description: Local development
tags:
  - name: Health
  - name: Auth
  - name: Users
  - name: Tenants
  - name: Properties
  - name: Units
  - name: Pipeline
  - name: Clients
  - name: Deals
  - name: Payments
  - name: Schedule
  - name: Payable Reminders
  - name: Finance
  - name: Reports
  - name: Dashboard
  - name: Contracts
  - name: SMS
  - name: Land
  - name: Masters
  - name: Work Orders
  - name: Warehouse
  - name: Portal
  - name: Advanced
  - name: Version Gate

paths:
  # ═══════════════════════════════════════════════════════════════════
  # Health
  # ═══════════════════════════════════════════════════════════════════
  /health:
    get:
      tags: [Health]
      summary: Liveness check
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
  /ready:
    get:
      tags: [Health]
      summary: Readiness check (pings DB)
      responses:
        '200':
          description: Ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

  # ═══════════════════════════════════════════════════════════════════
  # Auth
  # ═══════════════════════════════════════════════════════════════════
  /api/v1/auth/register:
    post:
      tags: [Auth]
      summary: Register new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, full_name]
              properties:
                email: { type: string, format: email, maxLength: 255 }
                password: { type: string, minLength: 8, maxLength: 72 }
                full_name: { type: string, minLength: 2, maxLength: 120 }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthEnvelope'

  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email, maxLength: 255 }
                password: { type: string, minLength: 8, maxLength: 72 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthEnvelope'

  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      summary: Rotate tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthEnvelope'

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: Revoke refresh session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'

  /api/v1/auth/logout-all:
    post:
      tags: [Auth]
      summary: Revoke all sessions
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'

  /api/v1/auth/change-password:
    post:
      tags: [Auth]
      summary: Change password
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [current_password, new_password]
              properties:
                current_password: { type: string, minLength: 8, maxLength: 72 }
                new_password: { type: string, minLength: 8, maxLength: 72 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'

  /api/v1/auth/account:
    delete:
      tags: [Auth]
      summary: Delete own account
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password]
              properties:
                password: { type: string, minLength: 8, maxLength: 72 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'

  /api/v1/auth/sessions:
    get:
      tags: [Auth]
      summary: List own active sessions
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataEnvelope'

  /api/v1/auth/sessions/{id}:
    delete:
      tags: [Auth]
      summary: Revoke a session
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/PathID'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'

  # ═══════════════════════════════════════════════════════════════════
  # Users
  # ═══════════════════════════════════════════════════════════════════
  /api/v1/users/me:
    get:
      tags: [Users]
      summary: Get current user profile
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserEnvelope'
    patch:
      tags: [Users]
      summary: Update current user profile
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [full_name]
              properties:
                full_name: { type: string, minLength: 2, maxLength: 120 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserEnvelope'

  /api/v1/admin/users:
    get:
      tags: [Users]
      summary: List users (admin)
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - { in: query, name: search, schema: { type: string } }
        - { in: query, name: sort_by, schema: { type: string, enum: [created_at, email, full_name] } }
        - { in: query, name: sort_order, schema: { type: string, enum: [asc, desc] } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse'
    post:
      tags: [Users]
      summary: Create staff user (admin)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, full_name, role]
              properties:
                email: { type: string, format: email, maxLength: 255 }
                password: { type: string, minLength: 8, maxLength: 72 }
                full_name: { type: string, minLength: 2, maxLength: 120 }
                role: { type: string, enum: [company_admin, sales_head, manager, accountant, cashier, foreman, warehouse_manager, broker] }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserEnvelope'

  /api/v1/admin/users/{id}:
    get:
      tags: [Users]
      summary: Get user by ID (admin)
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/PathID'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserEnvelope'

  /api/v1/admin/users/{id}/can-login:
    patch:
      tags: [Users]
      summary: Toggle can_login (admin)
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/PathID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [can_login]
              properties:
                can_login: { type: boolean }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'

  /api/v1/admin/users/{id}/role:
    patch:
      tags: [Users]
      summary: Update role (admin)
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/PathID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role: { type: string, enum: [company_admin, sales_head, manager, accountant, cashier, foreman, warehouse_manager, broker] }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'

  # ═══════════════════════════════════════════════════════════════════
  # Tenants (super_admin only)
  # ═══════════════════════════════════════════════════════════════════
  /api/v1/super-admin/tenants:
    post:
      tags: [Tenants]
      summary: Create tenant
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, slug]
              properties:
                name: { type: string, minLength: 2, maxLength: 255 }
                slug: { type: string, minLength: 3, maxLength: 100 }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataEnvelope'
    get:
      tags: [Tenants]
      summary: List tenants
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - { in: query, name: search, schema: { type: string } }
        - { in: query, name: is_active, schema: { type: boolean } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse'

  /api/v1/super-admin/tenants/{id}:
    get:
      tags: [Tenants]
      summary: Get tenant by ID
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/PathID'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataEnvelope'
    patch:
      tags: [Tenants]
      summary: Update tenant
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/PathID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                logo_url: { type: string }
                phone: { type: string }
                email: { type: string }
                address: { type: string }
                primary_currency: { type: string }
                timezone: { type: string }
                locale: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataEnvelope'

  /api/v1/super-admin/tenants/{id}/activate:
    post:
      tags: [Tenants]
      summary: Activate tenant
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/PathID'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'

  /api/v1/super-admin/tenants/{id}/deactivate:
    post:
      tags: [Tenants]
      summary: Deactivate tenant
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/PathID'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'

  /api/v1/super-admin/tenants/{id}/subscription:
    post:
      tags: [Tenants]
      summary: Set subscription plan
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/PathID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [plan, expires_at]
              properties:
                plan: { type: string }
                expires_at: { type: string, format: date-time }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataEnvelope'

  # ═══════════════════════════════════════════════════════════════════
  # Properties
  # ═══════════════════════════════════════════════════════════════════
  /api/v1/properties:
    get:
      tags: [Properties]
      summary: List properties
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - { in: query, name: search, schema: { type: string } }
        - { in: query, name: status, schema: { type: string } }
        - { in: query, name: sort_by, schema: { type: string } }
        - { in: query, name: sort_order, schema: { type: string, enum: [asc, desc] } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse'
    post:
      tags: [Properties]
      summary: Create property (admin)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, property_type]
              properties:
                name: { type: string, minLength: 2, maxLength: 255 }
                property_type: { type: string }
                address: { type: string }
                city: { type: string }
                district: { type: string }
                description: { type: string }
                currency: { type: string }
                construction_start_date: { type: string, format: date }
                construction_end_date: { type: string, format: date }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataEnvelope'

  /api/v1/properties/{id}:
    get:
      tags: [Properties]
      summary: Get property
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/PathID'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataEnvelope'
    patch:
      tags: [Properties]
      summary: Update property (admin)
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/PathID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                address: { type: string }
                city: { type: string }
                district: { type: string }
                description: { type: string }
                status: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataEnvelope'
    delete:
      tags: [Properties]
      summary: Delete property (admin)
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/PathID'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'

  /api/v1/properties/{id}/blocks:
    get:
      tags: [Properties]
      summary: List blocks
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/PathID'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataEnvelope'
    post:
      tags: [Properties]
      summary: Add block (admin)
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/PathID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, floors_count]
              properties:
                name: { type: string, minLength: 1, maxLength: 100 }
                floors_count: { type: integer, minimum: 1, maximum: 200 }
                underground_floors: { type: integer }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataEnvelope'

  /api/v1/properties/{id}/blocks/{block_id}:
    patch:
      tags: [Properties]
      summary: Update block (admin)
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/PathID'
        - { in: path, name: block_id, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                sort_order: { type: integer }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataEnvelope'
    delete:
      tags: [Properties]
      summary: Delete block (admin)
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/PathID'
        - { in: path, name: block_id, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'

  /api/v1/properties/{id}/blocks/{block_id}/floors:
    get:
      tags: [Properties]
      summary: List floors
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/PathID'
        - { in: path, name: block_id, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataEnvelope'

  /api/v1/properties/{id}/chessboard:
    get:
      tags: [Units]
      summary: Chessboard view
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/PathID'
        - { in: query, name: status, schema: { type: string } }
        - { in: query, name: unit_type, schema: { type: string } }
        - { in: query, name: rooms, schema: { type: integer } }
        - { in: query, name: price_min, schema: { type: number } }
        - { in: query, name: price_max, schema: { type: number } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataEnvelope'

  # ═══════════════════════════════════════════════════════════════════
  # Units
  # ═══════════════════════════════════════════════════════════════════
  /api/v1/units:
    get:
      tags: [Units]
      summary: List units
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - { in: query, name: status, schema: { type: string } }
        - { in: query, name: unit_type, schema: { type: string } }
        - { in: query, name: property_id, schema: { type: string, format: uuid } }
        - { in: query, name: block_id, schema: { type: string, format: uuid } }
        - { in: query, name: rooms, schema: { type: integer } }
        - { in: query, name: price_min, schema: { type: number } }
        - { in: query, name: price_max, schema: { type: number } }
        - { in: query, name: sort_by, schema: { type: string } }
        - { in: query, name: sort_order, schema: { type: string, enum: [asc, desc] } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse'
    post:
      tags: [Units]
      summary: Create unit (admin)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUnitRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataEnvelope'

  /api/v1/units/bulk:
    post:
      tags: [Units]
      summary: Bulk create units (admin)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [property_id, block_id, floor_id, floor_number, unit_type, number_from, number_to]
              properties:
                property_id: { type: string, format: uuid }
                block_id: { type: string, format: uuid }
                floor_id: { type: string, format: uuid }
                floor_number: { type: integer }
                unit_type: { type: string }
                rooms: { type: integer }
                total_area: { type: number }
                base_price: { type: number }
                number_from: { type: integer, minimum: 1 }
                number_to: { type: integer, minimum: 1 }
                prefix: { type: string }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataEnvelope'

  /api/v1/units/{id}:
    get:
      tags: [Units]
      summary: Get unit
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/PathID'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataEnvelope'
    patch:
      tags: [Units]
      summary: Update unit (admin)
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/PathID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                rooms: { type: integer }
                total_area: { type: number }
                living_area: { type: number }
                kitchen_area: { type: number }
                balcony_area: { type: number }
                base_price: { type: number }
                current_price: { type: number }
                finishing: { type: string }
                description: { type: string }
                layout_url: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataEnvelope'
    delete:
      tags: [Units]
      summary: Delete unit (admin)
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/PathID'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'

  /api/v1/units/{id}/status:
    patch:
      tags: [Units]
      summary: Change unit status (admin)
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/PathID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action]
              properties:
                action: { type: string, enum: [book, release, reserve, mark_sold] }
                book_until: { type: string, format: date-time }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataEnvelope'

  # ═══════════════════════════════════════════════════════════════════
  # Pipeline Stages
  # ═══════════════════════════════════════════════════════════════════
  /api/v1/pipeline-stages:
    get:
      tags: [Pipeline]
