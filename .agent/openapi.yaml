# ═══════════════════════════════════════════════════════════════════════
# Components
# ═══════════════════════════════════════════════════════════════════════
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    PathID:
      in: path
      name: id
      required: true
      schema:
        type: string
        format: uuid
    Page:
      in: query
      name: page
      schema:
        type: integer
        minimum: 1
        default: 1
    Limit:
      in: query
      name: limit
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

  responses:
    ServiceUnavailable:
      description: Service unavailable
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    DataEnvelope:
      type: object
      properties:
        data: {}

    StatusResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            status: { type: string }

    ErrorResponse:
      type: object
      properties:
        code: { type: string }
        message: { type: string }
        details:
          type: object
          additionalProperties: true

    PaginatedResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            items:
              type: array
              items: {}
            pagination:
              $ref: '#/components/schemas/Pagination'

    Pagination:
      type: object
      properties:
        page: { type: integer }
        limit: { type: integer }
        total: { type: integer }

    User:
      type: object
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        full_name: { type: string }
        role: { type: string, enum: [super_admin, company_admin, sales_head, manager, accountant, cashier, foreman, warehouse_manager, broker] }
        can_login: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    UserEnvelope:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/User'

    AuthResponse:
      type: object
      properties:
        access_token: { type: string }
        access_token_expires_at: { type: string, format: date-time }
        refresh_token: { type: string }
        refresh_token_expires_at: { type: string, format: date-time }
        user:
          $ref: '#/components/schemas/User'

    AuthEnvelope:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/AuthResponse'

    CreateDealRequest:
      type: object
      required: [client_id, unit_id, payment_type, total_amount, currency]
      properties:
        client_id: { type: string, format: uuid }
        unit_id: { type: string, format: uuid }
        payment_type: { type: string, enum: [full_payment, installment, mortgage, barter, combined] }
        total_amount: { type: number, minimum: 0.01 }
        currency: { type: string, maxLength: 3 }
        discount_amount: { type: number }
        discount_reason: { type: string }
        surcharge_amount: { type: number }
        down_payment: { type: number }
        installment_months: { type: integer }
        installment_frequency: { type: string, enum: [monthly, quarterly, custom] }
        mortgage_bank: { type: string }
        mortgage_rate: { type: number }
        notes: { type: string }

    CreateUnitRequest:
      type: object
      required: [property_id, block_id, floor_id, unit_number, unit_type, floor_number]
      properties:
        property_id: { type: string, format: uuid }
        block_id: { type: string, format: uuid }
        floor_id: { type: string, format: uuid }
        unit_number: { type: string, maxLength: 20 }
        unit_type: { type: string }
        floor_number: { type: integer, minimum: 1 }
        rooms: { type: integer }
        total_area: { type: number }
        living_area: { type: number }
        kitchen_area: { type: number }
        balcony_area: { type: number }
        base_price: { type: number }
        finishing: { type: string }
        description: { type: string }
        position: { type: integer }
